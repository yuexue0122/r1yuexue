<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网页主页</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }
        header {
            background-color: #4a76a8;
            color: white;
            text-align: center;
            padding: 20px;
        }
        nav {
            background-color: #333;
            overflow: hidden;
        }
        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        .container {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
        /* 图片样式 */
        .image-link {
            display: block;
            margin: 20px auto;
            text-align: center;
        }
        .image-link img {
            max-width: 100%;
            height: auto;
            border: 2px solid #4a76a8;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的网页</h1>
        <p>这是一个简洁、响应式的主页示例</p>
    </header>

    <nav>
        <a href="#home">首页</a>
        <a href="#about">关于</a>
        <a href="#services">服务</a>
        <a href="#contact">联系</a>
        <!-- 新增文章页面链接 -->
        <a href="article.html">文章</a>
    </nav>

    <div class="container">
        <section id="home">
            <h2>首页</h2>
            <p>这是网站的主页内容区域，您可以在这里添加介绍性文字、图片或其他信息。</p>
        </section>

        <section id="about">
            <h2>关于</h2>
            <p>在这里可以介绍您的个人或公司背景、团队信息等。</p>
        </section>

        <section id="services">
        <style>
        .image-container {
         display: flex;
         gap: 20px; /* 两张图片之间的间距 */
         align-items: flex-start;
         flex-wrap: wrap; /* 小屏幕自动换行 */
        }
        </style>
            <h2>服务</h2>
            <p>虚构史学家发力了</p>
             <!-- 新增图片容器，用于并排布局 -->
             <div class="image-container">
             <!-- 新增图片超链接 -->
             <a href="article1.html" class="image-link">
             <img src="my-article-image1.jpg" alt="文章配图" 
             class="service-image"
             style="width: 300px;
             height: auto;
             border-radius: 8px;">
              </a>
             <a href="article2.html" class="image-link">
             <img src="my-article-image2.jpg" alt="另一张图片"
             class="service-image"
             style="width: 300px;
             height: auto;
             border-radius: 8px;">
             </a>
             </div>
        </section>

        <section id="contact">
            <h2>联系</h2>
            <p>bro怎么会留这个</p>
        </section>
    </div>
    <footer>
        <p>&copy; 2026 我的网站. 保留所有权利。</p>
    </footer>
</body>
</html>
